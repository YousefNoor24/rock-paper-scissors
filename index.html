<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
        <title>Rock Paper Scissors</title>
    </head>
    <body>
        <main>
            <h1 class="title">Rock Paper Scissors!</h1>
            <div id="result">
                <h3 class="score-board">Score Board</h3>
                <p class="info" id="round">Can you beat the computer in 5 rounds?</p>
                <p class="info-score" id="player-score">Player: 0</p>
                <p class="info-score" id="computer-score">Computer: 0</p>
                <p class="info" id="announcer">Make a choice to begin the game</p>
            </div>
            <div id="player-selection">
                <button type="button" value="rock">Rock</button>
                <button type="button" value="paper">Paper</button>
                <button type="button" value="scissors">Scissors</button>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
