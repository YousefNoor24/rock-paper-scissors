<html>
    <head>
        <meta charset="UTF-8">
        <title>Rock Paper Scissors</title>
    </head>
    <body>
        <h1>Rock Paper Scissors!</h1>
        <div id="result">
            <h3>Score Board:</h3>
            <p id="player-score">Player: 0</p>
            <p id="computer-score">Computer: 0</p>
            <p id="announcer">Make a choice to begin the game</p>
        </div>
        <div id="player-selection">
            <button type="button" value="rock">Rock</button>
            <button type="button" value="paper">Paper</button>
            <button type="button" value="scissors">Scissors</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
